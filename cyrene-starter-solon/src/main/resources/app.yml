server:
  port: 9000
  contextPath: /api


solon.app:
  name: 'cyrene-admin-web'
#添加静态目录映射
solon.staticfiles.mappings:
  - path: "/download/" #路径，可以是目录或单文件
    repository: "D:/server/file/" #1.添加本地绝对目录（仓库只能是目录）

solon.serialization.json:
  dateAsFormat: 'yyyy-MM-dd HH:mm:ss' #配置日期格式（默认输出为时间戳，对 Date、LocalDateTime 有效）
  dateAsTimeZone: 'GMT+8' #配置时区
  dateAsTicks: false #将date转为毫秒数（和 dateAsFormat 二选一）
  longAsString: true #将long型转为字符串输出 （默认为false）
  boolAsInt: false   #将bool型转为字符串输出 （默认为false）
  nullStringAsEmpty: false
  nullBoolAsFalse: false
  nullNumberAsZero: false
  nullArrayAsEmpty: false
  nullAsWriteable: false #输出所有null值
  enumAsName: false #枚举使用名字（v2.2.1 后支持）


sqltoy:
  sqlResourcesDir: classpath:sqltoy
  unify-fields-handler: net.cocotea.cyreneadmin.handler.SqlToyUnifyFieldsHandler
  debug: false


myapp:
  # 默认创建用户的密码
  password: admin#123456
  # 密码加密的加盐
  password-salt: Admin@salt
  # 开启缓存
  permission-cache: false
  # 是否开启系统日志保存功能
  save-log: true
  # 强密码，为空或者为none表示关闭
  strong-password: 123456
  # 路由放行（用逗号分割）
  excludes: /system/dashboard/index,/system/login,/system/captcha,/
  # 文件存放配置
  file:
    # 默认文件存放位置
    default-path: F:/Files/default/
    # 头像保存位置
    avatar: F:/Files/avatar/
    # 支持上传的文件格式
    support-filetype: pdf,doc,docx,ppt,txt,md,xlsx,xlx,jpg,png
    # 媒体格式
    media-filetype: mp4,avi,mpg,mpeg,wmv,flv,swf,mov,mkv
  # MySQL
  db1:
    schema: cyrene_admin
    jdbcUrl: jdbc:mysql://127.0.0.1:3306/cyrene_admin?useUnicode=true&characterEncoding=utf-8&useSSL=true&serverTimezone=Asia/Shanghai&tinyInt1isBit=false
    driverClassName: com.mysql.cj.jdbc.Driver
    username: root
    password: root
  # Redis
  rd1:
    server: 127.0.0.1:6379
    db: 1
    password:


# Sa-Token 配置
sa-token:
  # token名称 (同时也是cookie名称)
  token-name: Authorization
  # token有效期，单位s 默认30天, -1代表永不过期
  timeout: 86400
  # token临时有效期 (指定时间内无操作就视为token过期) 单位: 秒
  active-timeout: -1
  # 是否允许同一账号并发登录 (为true时允许一起登录, 为false时新登录挤掉旧登录)
  is-concurrent: true
  # 在多人登录同一账号时，是否共用一个token (为true时所有登录共用一个token, 为false时每次登录新建一个token)
  is-share: true
  # token风格
  token-style: random-64
  # 是否输出操作日志
  is-log: false
