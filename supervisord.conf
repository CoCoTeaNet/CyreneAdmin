[supervisord]
; Docker 中必须为 true，保持前台运行
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
logfile_maxbytes=50MB
logfile_backups=10
loglevel=info
pidfile=/var/run/supervisord.pid
; 移除 directory=/tmp，使用默认或指定 /app
; user=root (supervisord 自身通常需要 root 来管理子进程)
minfds=1024
minprocs=200

[program:nginx]
command=/usr/sbin/nginx -g "daemon off;"
autostart=true
autorestart=true
; 保持 stdout 以便 docker logs 捕获
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
; 确保 nginx 配置中 worker 用户不是 root
priority=999

[program:java-app]
; 添加内存限制和容器支持
command=java -Xms512m -Xmx512m -XX:+UseContainerSupport -jar /app/app.jar
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
; 环境变量
environment=SPRING_PROFILES_ACTIVE="prod",JAVA_OPTS="-Dfile.encoding=UTF-8"
; 启动顺序：优先级低于 nginx (数字越小优先级越高，或者通过 startsecs 控制)
; 这里假设希望 java 先启动完，nginx 再启动，通常 nginx 作为网关可以后启动
priority=100
startsecs=10
startretries=3